<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Interview Question Generator</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh; /* FIX: Changed from height to min-height to prevent clipping */
      margin: 0;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 32px;
      border-radius: 16px;
      width: 100%;
      max-width: 550px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      border: 1px solid #f1f5f9;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
    }

    p.subtitle {
      color: #64748b;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .example-tag {
      display: inline-block;
      font-size: 12px;
      background: #eff6ff;
      color: #2563eb;
      padding: 4px 8px;
      border-radius: 6px;
      margin-bottom: 12px;
      cursor: pointer;
      border: 1px solid #dbeafe;
      font-weight: 500;
      transition: background 0.2s;
    }

    .example-tag:hover {
      background: #dbeafe;
    }

    .input-group {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    button {
      padding: 12px 24px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: background 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    /* Beautiful card formatting for lists */
    ul {
      margin-top: 28px;
      padding: 0;
      list-style-type: none;
    }

    li {
      margin-bottom: 16px;
      line-height: 1.6;
      background: #f8fafc;
      padding: 16px;
      border-radius: 10px;
      border-left: 4px solid #2563eb;
      font-size: 15px;
      color: #334155;
    }

    .spinner {
      margin: 24px auto;
      width: 32px;
      height: 32px;
      border: 3px solid #e2e8f0;
      border-top: 3px solid #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .error {
      color: #dc2626;
      background: #fef2f2;
      border: 1px solid #fee2e2;
      padding: 12px;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 14px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>AI Interview Questions</h1>
    <p class="subtitle">Enter a job title to generate 3 thoughtful interview scenarios.</p>
    
    <!-- UX Add: Clickable dynamic example tag -->
    <div class="example-tag" onclick="useExample()">✨ Use Example: Customer Success Manager</div>

    <!-- UX Add: Wrapped inside a form element so pressing 'Enter' submits natively -->
    <form id="generatorForm" onsubmit="generateQuestions(event)">
      <div class="input-group">
        <input
          type="text"
          id="jobTitle"
          placeholder="e.g., Product Designer"
          required
          autocomplete="off"
        />
        <button id="generateBtn" type="submit">Generate</button>
      </div>
    </form>

    <div class="spinner" id="spinner"></div>
    <div class="error" id="error"></div>
    <ul id="results"></ul>
  </div>

  <script>
    // UX Add: Quick helper to inject the prompt requirement example
    function useExample() {
      document.getElementById("jobTitle").value = "Customer Success Manager";
      document.getElementById("jobTitle").focus();
    }

    async function generateQuestions(event) {
      // Prevent standard browser page reload on form submit
      event.preventDefault();

      const input = document.getElementById("jobTitle");
      const button = document.getElementById("generateBtn");
      const spinner = document.getElementById("spinner");
      const results = document.getElementById("results");
      const error = document.getElementById("error");

      const title = input.value.trim();

      if (!title) {
        error.textContent = "Please enter a job title.";
        error.style.display = "block";
        return;
      }

      // Reset state
      error.textContent = "";
      error.style.display = "none";
      results.innerHTML = "";
      spinner.style.display = "block";
      button.disabled = true;

      try {
        const response = await fetch("https://ai-interview-generator-1zwy.onrender.com/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ title: title })
        });

        if (!response.ok) {
          throw new Error("Server responded with an error status.");
        }

        const data = await response.json();

        // FIX: Your backend already returns an array. No need to call .split("\n") on it.
        const questions = data.questions; 

        if (!questions || questions.length === 0) {
          throw new Error("No questions returned from the API.");
        }

        questions.forEach(question => {
          const li = document.createElement("li");
          li.textContent = question;
          results.appendChild(li);
        });

        // UX Tweak: Only clear input on successful operational generation
        input.value = "";

      } catch (err) {
        error.textContent = "Something went wrong. Please check your backend connection.";
        error.style.display = "block";
      } finally {
        spinner.style.display = "none";
        button.disabled = false;
      }
    }
  </script>
</body>
</html>
